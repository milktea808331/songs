<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>奶茶茶舖 - 雲端大廳</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { background: #2b2d31; color: #fff; font-family: '微軟正黑體', sans-serif; margin: 0; padding: 20px; }
        .container { display: flex; gap: 20px; max-width: 900px; margin: 0 auto; }
        .box { background: #1e1f22; padding: 20px; border-radius: 10px; flex: 1; border: 1px solid #444; }
        .stat { font-size: 18px; margin: 10px 0; padding: 10px; background: #2b2d31; border-radius: 5px; }
        input { padding: 8px; width: 70%; background: #2b2d31; border: 1px solid #444; color: white; border-radius: 4px; }
        button { padding: 8px 15px; background: #5865F2; border: none; color: white; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="box">
            <h2>💰 我的錢包</h2>
            <div id="wallet">正在連線至雲端...</div>
        </div>
        <div class="box">
            <h2>🎤 點歌區</h2>
            <input type="text" id="songInput" placeholder="輸入歌名...">
            <button onclick="addSong()">點歌</button>
            <ul id="songList"></ul>
        </div>
    </div>

  <script>
    // 你的 Firebase 設定
    const firebaseConfig = {
        apiKey: "AIzaSyC9Kn4B2Idp3o7cLsUnfqUrm5S81mHI880",
        databaseURL: "https://song-c5cb3-default-rtdb.asia-southeast1.firebasedatabase.app"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 1. 匿名登入 (處理身分)
    firebase.auth().signInAnonymously();

    // 2. 修正後的歌單顯示邏輯
    db.ref('songList').on('value', (snapshot) => {
        const list = document.getElementById('songList');
        list.innerHTML = '';
        snapshot.forEach(child => {
            let data = child.val();
            // 如果 data 是物件，取它的 name 欄位；如果是純文字，直接用
            let songName = (typeof data === 'object' && data !== null) ? (data.name || "未知歌曲") : data;
            
            let li = document.createElement('li');
            li.textContent = "🎵 " + songName; // 使用 textContent 可以避免 HTML 注入問題
            list.appendChild(li);
        });
    });

    // 3. 點歌功能
    function addSong() {
        const input = document.getElementById('songInput');
        if(input.value.trim()) {
            db.ref('songList').push({
                name: input.value.trim(),
                timestamp: Date.now()
            });
            input.value = '';
            alert("點歌成功！");
        }
    }
</script>
</body>
</html>
