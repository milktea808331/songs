<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>奶茶的互動空間</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        :root { --gold: #e2b37e; --bg: #0b0b0b; --panel: #161616; --border: #2a2a2a; }
        body { background: var(--bg); color: #fff; font-family: "Microsoft JhengHei"; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .box { background: var(--panel); padding: 40px; border-radius: 20px; border: 1px solid var(--gold); text-align: center; width: 320px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: white; box-sizing: border-box; border-radius: 8px; }
        .btn { padding: 10px 20px; background: var(--gold); border: none; cursor: pointer; color: #000; font-weight: bold; border-radius: 5px; margin: 5px; width: 100%; }
        .btn-sec { background: #444; color: white; }
        .sidebar { width: 75px; background: #0a0a0a; display: flex; flex-direction: column; align-items: center; padding-top: 40px; border-right: 1px solid var(--border); }
        .nav-item { margin-bottom: 35px; cursor: pointer; opacity: 0.3; transition: 0.3s; text-align: center; font-size: 13px; }
        .nav-item.active { opacity: 1; color: var(--gold); border-right: 3px solid var(--gold); }
        .content-area { flex-grow: 1; overflow-y: auto; padding: 40px; display: none; }
        .data-card { background: var(--panel); padding: 20px; border-radius: 10px; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="authModal" class="modal">
        <div class="box" id="modalContent">
            <h2>歡迎來到奶茶茶舖</h2>
            <button class="btn" onclick="showRegister()">首次登入 (綁定)</button>
            <button class="btn" onclick="showLogin()">已有帳密登入</button>
        </div>
    </div>

    <main id="mainApp" class="content-area">
        <nav class="sidebar">
            <div class="nav-item active" onclick="switchTab(0)">📊<br>資產</div>
            <div class="nav-item" onclick="switchTab(1)">🎵<br>歌單</div>
        </nav>
        <div style="padding:40px;">
            <h1>歡迎回來，<span id="userNick"></span></h1>
            <div id="tabContent" class="data-card">正在讀取您的資產...</div>
        </div>
    </main>

    <script>
        if (!firebase.apps.length) {
            firebase.initializeApp({
                apiKey: "AIzaSyC9Kn4B2Idp3o7cLsUnfQUrm5S81mHI880", 
                databaseURL: "https://song-c5cb3-default-rtdb.asia-southeast1.firebasedatabase.app/" 
            });
        }
        const db = firebase.database();

        // 登入狀態檢查與數據讀取
        window.onload = () => {
            const acc = localStorage.getItem('userAccount');
            if(acc) {
                document.getElementById('authModal').style.display = 'none';
                document.getElementById('mainApp').style.display = 'flex';
                document.getElementById('userNick').innerText = acc;
                loadUserData(acc);
            }
        };

        function loadUserData(acc) {
            db.ref('userStats').orderByChild('account').equalTo(acc).once('value', snap => {
                if(snap.exists()) {
                    const data = Object.values(snap.val())[0];
                    document.getElementById('tabContent').innerHTML = `
                        <p>珍珠數量：${data.stamps || 0} 顆</p>
                        <p>水票數量：${data.waterTickets || 0} 張</p>
                    `;
                }
            });
        }

        function switchTab(index) {
            document.querySelectorAll('.nav-item').forEach((item, i) => {
                item.classList.toggle('active', i === index);
            });
            const content = document.getElementById('tabContent');
            if(index === 0) {
                const acc = localStorage.getItem('userAccount');
                loadUserData(acc);
            } else {
                content.innerHTML = "<p>歌單功能開發中，敬請期待！</p>";
            }
        }

        // --- 登入註冊邏輯 ---
        function resetModal() { document.getElementById('modalContent').innerHTML = `<h2>歡迎來到奶茶茶舖</h2><button class="btn" onclick="showRegister()">首次登入 (綁定)</button><button class="btn" onclick="showLogin()">已有帳密登入</button>`; }
        
        function showLogin() {
            document.getElementById('modalContent').innerHTML = `<h2>帳密登入</h2><input type="text" id="loginAcc" placeholder="輸入帳號"><input type="password" id="loginPwd" placeholder="輸入密碼"><button class="btn" onclick="login()">登入</button><button class="btn btn-sec" onclick="resetModal()">返回</button><p id="loginMsg" style="color:red; font-size:12px;"></p>`;
        }

        function showRegister() {
            const code = Math.floor(1000 + Math.random() * 9000);
            document.getElementById('modalContent').innerHTML = `<h2>身份驗證</h2><p>請在聊天室輸入：</p><h1 style="color:var(--gold)">!綁定 ${code}</h1><div id="regForm" style="display:none;"><input type="text" id="newAcc" placeholder="設定帳號"><input type="password" id="newPwd" placeholder="設定密碼"><button class="btn" onclick="registerUser('${code}')">完成註冊</button></div><button class="btn btn-sec" onclick="resetModal()">返回</button>`;
            const listener = db.ref('authCodes/' + code).on('value', snap => { if(snap.exists()) { document.getElementById('regForm').style.display = 'block'; db.ref('authCodes/' + code).off('value', listener); } });
        }

        function registerUser(code) {
            const acc = document.getElementById('newAcc').value;
            const pwd = document.getElementById('newPwd').value;
            if (!acc || !pwd) { alert("請輸入帳號與密碼"); return; }
            db.ref('authCodes/' + code).once('value', snap => {
                const uid = snap.val().uid;
                db.ref('userStats/' + uid).update({ account: acc, password: pwd }).then(() => {
                    db.ref('authCodes/' + code).remove();
                    localStorage.setItem('userAccount', acc);
                    alert("綁定成功！");
                    location.reload();
                });
            });
        }

        function login() {
            const acc = document.getElementById('loginAcc').value;
            const pwd = document.getElementById('loginPwd').value;
            db.ref('userStats').orderByChild('account').equalTo(acc).once('value', snap => {
                let found = false;
                snap.forEach(c => { if(c.val().password === pwd) { localStorage.setItem('userAccount', acc); found = true; location.reload(); } });
                if(!found) document.getElementById('loginMsg').innerText = "帳號或密碼錯誤";
            });
        }
    </script>
</body>
</html>
