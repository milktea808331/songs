<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>奶茶茶舖 - 雲端大廳</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { background: #2b2d31; color: #fff; font-family: '微軟正黑體', sans-serif; margin: 0; padding: 20px; }
        .container { display: flex; gap: 20px; max-width: 900px; margin: 0 auto; }
        .box { background: #1e1f22; padding: 20px; border-radius: 10px; flex: 1; border: 1px solid #444; }
        .stat { font-size: 18px; margin: 10px 0; padding: 10px; background: #2b2d31; border-radius: 5px; }
        input { padding: 8px; width: 70%; background: #2b2d31; border: 1px solid #444; color: white; border-radius: 4px; }
        button { padding: 8px 15px; background: #5865F2; border: none; color: white; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="box">
            <h2>💰 我的錢包</h2>
            <div id="wallet">正在連線至雲端...</div>
        </div>
        <div class="box">
            <h2>🎤 點歌區</h2>
            <input type="text" id="songInput" placeholder="輸入歌名...">
            <button onclick="addSong()">點歌</button>
            <ul id="songList"></ul>
        </div>
    </div>

   <script>
    const firebaseConfig = {
        apiKey: "AIzaSyC9Kn4B2Idp3o7cLsUnfqUrm5S81mHI880",
        databaseURL: "https://song-c5cb3-default-rtdb.asia-southeast1.firebasedatabase.app"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 匿名登入後，開始抓取資料
    firebase.auth().signInAnonymously().then(() => {
        // 為了確認連線是否正常，我們先抓取整份排行榜列表
        db.ref('userStats').on('value', (snapshot) => {
            const allUsers = snapshot.val();
            if (!allUsers) {
                document.getElementById('wallet').innerHTML = "目前沒有資料庫資料";
                return;
            }
            
            // 這裡顯示第一筆資料作為測試，看看有沒有正確抓到
            // 你之後可以透過「代碼綁定」來讓這裡只顯示「該觀眾」的資料
            const firstUid = Object.keys(allUsers)[0];
            const data = allUsers[firstUid];
            
            document.getElementById('wallet').innerHTML = `
                <div class="stat">珍珠: ${data.stamps || 0}</div>
                <div class="stat">喝水卷: ${data.waterTickets || 0}</div>
            `;
        });
    });

    // 點歌功能
    function addSong() {
        const val = document.getElementById('songInput').value;
        if(val) {
            db.ref('songList').push(val);
            document.getElementById('songInput').value = '';
            alert("點歌成功！");
        }
    }

    // 歌單顯示：加入 typeof 檢查，確保顯示的是文字而不是 [object Object]
    db.ref('songList').on('value', (snapshot) => {
        const list = document.getElementById('songList');
        list.innerHTML = '';
        snapshot.forEach(child => {
            let songText = child.val();
            // 如果讀到的是物件(例如 {name: "歌名"})，就抓取 name 欄位；否則直接顯示文字
            let displayVal = (typeof songText === 'object' && songText !== null) ? (songText.name || "未知歌曲") : songText;
            list.innerHTML += `<li>🎵 ${displayVal}</li>`;
        });
    });
</script>
</body>
</html>
